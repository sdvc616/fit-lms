<!DOCTYPE html>
<html>
<head>
<title>FIT Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* =========================
   YOUR ORIGINAL DESIGN (UNCHANGED)
========================= */

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
display:flex;
}

.sidebar{
width:240px;
background:#0a2a66;
color:white;
height:100vh;
position:fixed;
padding-top:30px;
z-index:1000;
}

.sidebar h3{text-align:center;margin-bottom:20px;}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 20px;
margin:6px 15px;
border-radius:8px;
background:rgba(255,255,255,0.05);
}

.sidebar a:hover{
background:white;
color:#0a2a66;
}

.main{
margin-left:240px;
width:100%;
}

.header{
background:white;
padding:10px 18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.nav-btn{
background:red;
color:white;
padding:7px 12px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.content{padding:18px 22px;}

.cards{
display:flex;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
min-width:220px;
}

.num{
font-size:26px;
font-weight:bold;
color:#0a2a66;
}

.icon{font-size:30px;}

.principal-section{
margin-top:20px;
width:100%;
min-height:420px;
position:relative;
background:url('img/fit.jpeg') center/cover no-repeat;
display:flex;
align-items:center;
padding:40px;
}

.principal-section::before{
content:"";
position:absolute;
width:100%;height:100%;
background:linear-gradient(90deg,rgba(255,255,255,0.85),rgba(255,255,255,0.6));
}

.principal-content{
position:relative;
}

.popup, .map-popup{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-content, .map-box{
background:white;
padding:20px;
border-radius:12px;
}

</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR (UNCHANGED) -->
<div class="sidebar" id="sidebar">
<h3>MENU</h3>
<a href="index.html">Home</a>
<a href="#" onclick="openDepartments()">Departments</a>
<a href="#">Staff</a>
<a href="#">Notices</a>
<a href="#" onclick="openLocation()">Location</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h2>Faran Institute of Technology</h2>
<a class="nav-btn" href="#" onclick="askLogout()">Logout</a>
</div>

<div class="content">

<div class="cards">

<div class="card">
<div>
<h3>Departments</h3>
<p>CIT, ET</p>
</div>
<div class="num" id="deptCount">0</div>
<div class="icon">🏢</div>
</div>

<div class="card">
<div>
<h3>Students</h3>
<p>Total Students</p>
</div>
<div class="num" id="studentCount">0</div>
<div class="icon">🎓</div>
</div>

<div class="card">
<div>
<h3>Staff</h3>
<p>Total Staff</p>
</div>
<div class="num" id="staffCount">0</div>
<div class="icon">👨‍🏫</div>
</div>

</div>

<!-- PRINCIPAL -->
<div class="principal-section">
<div class="principal-content">
<h2>Principal Message</h2>
<p>Welcome to FIT...</p>
</div>
</div>

</div>
</div>

<!-- POPUPS -->
<div class="popup" id="departmentPopup"></div>
<div class="map-popup" id="mapPopup"></div>

<!-- =========================
🔥 FIREBASE SCRIPT (FULL CONVERSION)
========================= -->

<script type="module">

import { requireLogin } from "./security.js";
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

requireLogin(async (user) => {

    console.log("Logged in:", user.email);

    // 🔥 GET DATA FROM FIRESTORE
    const ref = doc(db, "stats", "dashboard");
    const snap = await getDoc(ref);

    if (snap.exists()) {
        const data = snap.data();

        document.querySelector(".card:nth-child(1) .num").innerText = data.departments;
        document.querySelector(".card:nth-child(2) .num").innerText = data.students;
        document.querySelector(".card:nth-child(3) .num").innerText = data.staff;
    }

});

/* =========================
   LOGOUT
========================= */
window.askLogout = function(){
    if(confirm("Logout?")){
        signOut(auth).then(() => {
            window.location.href = "login.html";
        });
    }
};

/* =========================
   YOUR FUNCTIONS (UNCHANGED)
========================= */
window.openDepartments = function(){
    document.getElementById("departmentPopup").style.display = "flex";
};

window.openLocation = function(){
    document.getElementById("mapPopup").style.display = "flex";
};

</script>

</body>
</html>
