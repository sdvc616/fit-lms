<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#0a2a66;
color:white;
height:100vh;
position:fixed;
padding-top:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 20px;
margin:6px 15px;
border-radius:8px;
background:rgba(255,255,255,0.05);
}

.sidebar a:hover{
background:white;
color:#0a2a66;
}

/* MAIN */
.main{
margin-left:240px;
width:100%;
}

/* HEADER */
.header{
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* CONTENT */
.content{
padding:25px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.card h3{
margin:0;
color:#0a2a66;
}

.card p{
margin:5px 0 0;
font-size:13px;
color:#666;
}

.num{
font-size:26px;
font-weight:bold;
color:#0a2a66;
}

.icon{
font-size:30px;
opacity:0.7;
}

/* LMS */
.section-title{
margin-top:30px;
color:#0a2a66;
}

.lms-cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:15px;
}

.lms-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

/* MOBILE */
@media(max-width:768px){

body{
display:block;
}

.sidebar{
width:100%;
height:auto;
position:relative;
padding-bottom:15px;
}

.main{
margin-left:0;
width:100%;
}

.cards{
grid-template-columns:1fr;
}

}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h3 style="text-align:center;">ADMIN PANEL</h3>

<a href="admin_dashboard.html">Dashboard</a>
<a href="manage_staff.html">Manage Staff</a>
<a href="manage_users.html">Manage Users</a>
<a href="manage_notices.html">Manage Notices</a>
<a href="manage_subjects.html">Subjects</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">

<h2>Welcome Admin 👋</h2>

<a href="#" onclick="logout()"
style="background:red;color:white;padding:8px 12px;border-radius:6px;text-decoration:none;">
Logout
</a>

</div>

<div class="content">

<!-- CARDS -->
<div class="cards">

<div class="card">
<div>
<h3>Staff</h3>
<p>Total Staff Members</p>
</div>
<div class="num" id="staffCount">0</div>
<div class="icon">👨‍🏫</div>
</div>

<div class="card">
<div>
<h3>Users</h3>
<p>Registered Accounts</p>
</div>
<div class="num" id="userCount">0</div>
<div class="icon">👥</div>
</div>

<div class="card">
<div>
<h3>Recycle Bin</h3>
<p>Deleted Staff</p>
</div>
<div class="num" id="binCount">0</div>
<div class="icon">🗑️</div>
</div>

<div class="card">
<div>
<h3>Departments</h3>
<p>Total Departments</p>
</div>
<div class="num" id="deptCount">2</div>
<div class="icon">🏢</div>
</div>

</div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
collection,
getDocs,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ADMIN SECURITY */
onAuthStateChanged(auth, async(user)=>{

    if(!user){
        window.location.href = "login.html";
        return;
    }

    try{

        const userRef = doc(db,"users",user.uid);
        const userSnap = await getDoc(userRef);

        if(!userSnap.exists()){
            window.location.href = "login.html";
            return;
        }

        const userData = userSnap.data();

        /* ONLY ADMIN + SUPER ADMIN */
        if(
            userData.role !== "admin" &&
            userData.role !== "super_admin"
        ){
            alert("Access Denied");
            window.location.href = "index.html";
            return;
        }

        loadDashboard();

    }catch(error){
        console.log(error);
    }

});

/* LOAD DASHBOARD */
async function loadDashboard(){

    try{

        /* USERS */
        const userSnap = await getDocs(collection(db,"users"));

        let users = 0;

        userSnap.forEach(doc=>{
            users++;
        });

        document.getElementById("userCount").innerText = users;

        /* STAFF */
        const staffSnap = await getDocs(collection(db,"staff"));

        let staff = 0;
        let deleted = 0;

        staffSnap.forEach(doc=>{

            const data = doc.data();

            if(data.deleted === true){
                deleted++;
            }else{
                staff++;
            }

        });

        document.getElementById("staffCount").innerText = staff;
        document.getElementById("binCount").innerText = deleted;

        /* DEPARTMENTS */
        const deptSnap = await getDocs(collection(db,"departments"));

        document.getElementById("deptCount").innerText =
        deptSnap.size || 2;

    }catch(error){
        console.log(error);
    }

}

/* LOGOUT */
window.logout = async function(){

    try{

        await signOut(auth);

        window.location.href = "login.html";

    }catch(error){
        console.log(error);
    }

}

</script>

</body>
</html>
