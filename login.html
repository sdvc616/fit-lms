<!DOCTYPE html>
<html>
<head>
<title>FIT Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.top-header{
background:#0a2a66;
color:white;
text-align:center;
padding:20px;
}

.top-header img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid white;
}

.main{
display:flex;
justify-content:center;
padding:30px;
gap:20px;
}

.side{
display:none;
}

.center{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:30px;
width:320px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.msg{
padding:10px;
margin-bottom:10px;
border-radius:6px;
font-size:14px;
}

.error{background:#ffdddd;color:#a10000;}

.links{
margin-top:12px;
text-align:center;
}

.links a{
display:block;
margin-top:6px;
text-decoration:none;
font-weight:bold;
color:#0a2a66;
}

@media(max-width:900px){
.main{flex-direction:column;padding:15px;}
.login-box{width:100%;max-width:420px;}
}
</style>
</head>

<body>

<div class="top-header">
<img src="img/fit.jpeg">
<h1>Faran Institute of Technology (FIT)</h1>
</div>

<div class="main">

<div class="side"></div>

<div class="center">

<div class="login-box">

<h2>User Login</h2>

<p style="font-size:13px;color:#0a2a66;">
Login requires email verification (OTP).
</p>

<div id="msg" class="msg error" style="display:none;"></div>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<div class="links">
<a href="forgot.html">Forgot Password</a>
<a href="register.html">Don't have an account? Register</a>
</div>

</div>

</div>

<div class="side"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDafN_kj2uOS7fQw5tIEQSbarvS17ZIAE",
  authDomain: "fit-lms.firebaseapp.com",
  projectId: "fit-lms"
  appId: "1:523650703056:web:72845c5a1e2d51e95ec8d5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore(app);

window.loginUser = async function(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    try{

        /* IMPORTANT:
           We assume username = email OR you will map username → email later
        */

        const userCredential = await signInWithEmailAndPassword(auth, username, password);
        const user = userCredential.user;

        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        let role = "student";
        if(snap.exists()){
            role = snap.data().role;
        }

        if(role === "admin" || role === "super_admin"){
            window.location.href = "admin_dashboard.html";
        } else {
            window.location.href = "index.html";
        }

    } catch(error){
        let msg = document.getElementById("msg");
        msg.style.display = "block";
        msg.innerText = error.message;
    }
}

</script>

</body>
</html>
