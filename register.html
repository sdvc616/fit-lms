<!DOCTYPE html>
<html>
<head>

<title>FIT Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.top-header{
background:#0a2a66;
color:white;
text-align:center;
padding:20px;
}

.top-header img{
width:60px;
height:60px;
border-radius:50%;
border:2px solid white;
}

.main{
display:flex;
justify-content:center;
padding:30px;
gap:20px;
}

.side{display:none;}

.center{
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

.register-box{
background:white;
padding:30px;
width:320px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#0a2a66;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.login-link{
display:block;
margin-top:10px;
color:#0a2a66;
font-weight:bold;
text-decoration:none;
}

.msg{
padding:10px;
margin-bottom:10px;
border-radius:6px;
font-size:14px;
}

.error{background:#ffdddd;color:#a10000;}
.success{background:#ddffdd;color:#0a6b0a;}

@media(max-width:900px){
.main{flex-direction:column;padding:15px;}
.register-box{width:100%;max-width:420px;}
}
</style>

</head>

<body>

<div class="top-header">
<img src="img/fit.jpeg">
<h1>Faran Institute of Technology (FIT)</h1>
</div>

<div class="main">

<div class="side"></div>

<div class="center">

<div class="register-box">

<h2>Create Account</h2>

<div id="msg" class="msg" style="display:none;"></div>

<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password (min 8 chars)">

<button onclick="registerUser()">Register</button>

<a href="index.html" class="login-link">
Already have account? Login
</a>

</div>

</div>

<div class="side"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
sendEmailVerification
}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCDt5kcl-Ib-MCskjiQMiD_yShIhsLgGd0",
  authDomain: "fit-lms.firebaseapp.com",
  databaseURL: "https://fit-lms-default-rtdb.firebaseio.com",
  projectId: "fit-lms",
  storageBucket: "fit-lms.firebasestorage.app",
  messagingSenderId: "523650703056",
  appId: "1:523650703056:web:72845c5a1e2d51e95ec8d5"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


/* ================= REGISTER ================= */
window.registerUser = async function () {

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let msg = document.getElementById("msg");
    msg.style.display = "none";

    if (!username || !email || !password) {
        msg.style.display = "block";
        msg.className = "msg error";
        msg.innerText = "Please fill all fields!";
        return;
    }

    if (password.length < 8) {
        msg.style.display = "block";
        msg.className = "msg error";
        msg.innerText = "Password must be at least 8 characters!";
        return;
    }

    try {

        // 1. create account
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. send verification email
        await sendEmailVerification(user);

        // 3. save user in firestore
        await setDoc(doc(db, "users", user.uid), {
            username: username,
            email: email,
            role: "user",
            verified: false
        });

        // 4. IMPORTANT MESSAGE
        msg.style.display = "block";
        msg.className = "msg success";
        msg.innerText = "Verification email sent. Please check your Gmail and verify first.";

        // 5. DO NOT auto login or redirect immediately
        setTimeout(() => {
            window.location.replace("index.html");
        }, 3000);

    } catch (error) {
        msg.style.display = "block";
        msg.className = "msg error";
        msg.innerText = error.message;
    }
};


        if(error.code === "auth/email-already-in-use"){

            msg.innerText =
            "This email is already registered. Please login instead.";

        }

        else if(error.code === "auth/invalid-email"){

            msg.innerText =
            "Invalid email format.";

        }

        else if(error.code === "auth/weak-password"){

            msg.innerText =
            "Password must be at least 8 characters.";

        }

        else if(error.code === "auth/network-request-failed"){

            msg.innerText =
            "Network error. Please try again.";

        }

        else {

            msg.innerText =
            "Something went wrong. Try again.";

        }

        console.log(error);

    }

};

</script>


</body>
</html>
